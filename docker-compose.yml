name: cc-docker-project

services: #running docker image
  app:
   build:
    context: .
    dockerfile: dockerfile
   image: cc-docker-image
   container_name: cc-docker-container_name
   ports:
     - "8000:8000"
   volumes:
     - .:/app

  db:
   image: postgres:17 #base image for postgres
   container_name: cc-postgres-db
   restart: always #restart database if it automatically stops
   environment: 
    POSTGRES_USER: my_user
    POSTGRES_PASSWORD: my_password
    POSTGRES_DB: my_database
   volumes:
    - postgres_data:/var/lib/postgresql/data
   ports:
    - "5432:5432"

volumes:
 postgres_data: