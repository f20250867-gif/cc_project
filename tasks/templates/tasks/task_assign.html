{% extends "teams/base.html"%}
{% block content %}
{% load crispy_forms_tags %}

<h2>Assign Task</h2>

<form method="POST" action="{% url 'task-assign-confirmed' task.project.team.id task.project.id task.id %}">
    {% csrf_token %}
    <div class="form-group">
        <label for="user_id">Select User to Assign</label>
                <select  name="user_id" id="user_id" class="form-control">
                {% for user in remaining_team_members %}
                    <option value="{{ user.id }}">{{ user.username }}</option>
                {% endfor %}
        </select>

    </div>

    <button type="submit" class="btn btn-primary">Assign</button>
</form>
{% endblock content %}
