{% extends "teams/base.html"%}
{% block content %}
{% for team in allteams %}
<article class="media content-section">
    <div class="media-body">
        <h2><a class="article-title" href="{% url 'team-detail' team.id %}">{{ team.title }}</a></h2>
        <div class="article-metadata">
            <a class="mr-2" href="#">created by {{ team.member }}</a>
        </div>
    </div>
</article> 
{% endfor %}
</article>

{% endblock content %}
